<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D AR Library & Gallery</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    :root { --primary-color: #4f46e5; --success-color: #10b981; --background: #f8fafc; }
    body { font-family: sans-serif; background: var(--background); padding: 20px; }
    .container { max-width: 900px; margin: auto; }
    model-viewer { width: 100%; height: 400px; background: #eee; border-radius: 8px; }
    .upload-section { background: white; padding: 20px; border-radius: 12px; margin-top: 20px; }
    input, button { width: 100%; padding: 10px; margin: 5px 0; box-sizing: border-box; }
    .btn-upload { background: var(--success-color); color: white; border: none; cursor: pointer; }
    .grid-library { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
    .card { background: white; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
  </style>
</head>
<body>

<div class="container">
  <h1>Galeri 3D AR</h1>
  <model-viewer id="main-viewer" camera-controls auto-rotate ar></model-viewer>

  <div class="upload-section">
    <h3>Tambah Koleksi</h3>
    <input type="text" id="model-name" placeholder="Nama Model">
    <input type="file" id="file-upload" accept=".glb">
    <button id="upload-btn" class="btn-upload">Upload & Simpan</button>
    <p id="status"></p>
  </div>

  <h2>Pustaka Model</h2>
  <div id="library-grid" class="grid-library"></div>
</div>

<script>
  const mainViewer = document.getElementById('main-viewer');
  const libraryGrid = document.getElementById('library-grid');
  const status = document.getElementById('status');

  // Load Pustaka dari API Vercel
  async function loadLibrary() {
    const res = await fetch('/api/model');
    const models = await res.json();
    libraryGrid.innerHTML = models.map(m => `
      <div class="card">
        <p><strong>${m.name}</strong></p>
        <button onclick="mainViewer.src='${m.url}'">Lihat</button>
      </div>
    `).join('');
  }

  // Upload ke API Vercel
  document.getElementById('upload-btn').addEventListener('click', async () => {
    const file = document.getElementById('file-upload').files[0];
    const name = document.getElementById('model-name').value;
    if (!file || !name) return alert("Isi nama dan pilih file!");

    status.innerText = "Mengunggah...";
    const response = await fetch('/api/upload', {
      method: 'POST',
      body: file,
      headers: { 'x-vercel-filename': file.name, 'x-vercel-model-name': name }
    });

    if (response.ok) {
      status.innerText = "Berhasil!";
      loadLibrary();
    } else {
      status.innerText = "Gagal upload.";
    }
  });

  loadLibrary();
</script>
</body>
</html>
