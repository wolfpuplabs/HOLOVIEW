<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLOVIEW // Spatial AR Portal</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <style>
        :root {
            --bg-pure-black: #050507;
            --card-dark: #0b0b0f;
            --border-glow: #1f1f2e;
            --accent-spatial: #10b981; /* Green border when active like img 2 */
            --accent-glow: rgba(16, 185, 129, 0.1);
            --text-main: #f4f4f5;
            --text-muted: #71717a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-pure-black);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: rgba(11, 11, 15, 0.85);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid #18181b;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            z-index: 1;
            position: relative;
            margin-top: 40px;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .upload-box {
            border: 1px dashed #27272a;
            padding: 24px 16px;
            border-radius: 14px;
            cursor: pointer;
            background: #09090b;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }

        .upload-box:hover {
            border-color: #3b82f6;
        }

        .upload-box.has-file {
            border-style: solid;
            border-color: var(--accent-spatial);
            background: rgba(16, 185, 129, 0.02);
        }

        .upload-box input { display: none; }
        .box-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .box-sub { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .btn-spatial {
            background: var(--text-main);
            color: var(--bg-pure-black);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-spatial:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.15);
        }

        .btn-spatial:disabled {
            background: #18181b;
            color: #52525b;
            cursor: not-allowed;
            transform: none;
        }

        #status { font-size: 13px; margin-top: 14px; font-weight: 500; text-align: center; color: #3b82f6; }

        /* Viewer Container: Pure Black dengan Spatial Vibes Glow */
        #viewerContainer {
            width: 100%;
            height: 440px;
            background: radial-gradient(circle at center, rgba(30, 30, 50, 0.4) 0%, rgba(10, 10, 15, 0.9) 60%, #050507 100%);
            border-radius: 20px;
            margin-top: 24px;
            display: none;
            position: relative;
            border: 1px solid #1a1a26;
            overflow: hidden;
            box-shadow: inset 0 0 40px rgba(0, 0, 0, 0.9);
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: transparent;
        }

        /* Fullscreen & AR Icon Overrides */
        .btn-fullscreen {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(11, 11, 15, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid #27272a;
            color: #ffffff;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 12;
        }

        /* Modal Layout */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .ar-card-capture-area {
            width: 350px;
            height: 500px;
            background: #0b0b11;
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 1px solid #222235;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.1);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #161622;
            padding-bottom: 12px;
        }

        .card-logo-box {
            font-size: 20px;
        }

        .card-title-main {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            color: #ffffff;
        }

        .card-title-sub {
            font-size: 10px;
            color: #3b82f6;
            text-transform: uppercase;
            font-weight: 700;
        }

        .card-preview-body {
            flex-grow: 1;
            margin: 16px 0;
            background: #050508;
            border: 1px solid #141420;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-muted);
            font-size: 13px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #161622;
            padding-top: 12px;
        }

        .card-meta-title { font-size: 12px; color: #ffffff; font-weight: 600; margin-bottom: 2px;}
        .card-meta-desc { font-size: 10px; color: var(--text-muted); }

        /* QR Code Container agar bersih & kontras tinggi */
        #qrcode {
            width: 68px;
            height: 68px;
            background: #ffffff;
            padding: 5px;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div style="margin-bottom: 24px;">
            <h1 style="font-size: 22px; font-weight: 700; letter-spacing: -0.2px;">HOLOVIEW</h1>
            <div style="color: var(--text-muted); font-size: 12px; margin-top: 2px;">Ecosystem Engine active. Assets deployed locally.</div>
        </div>
        
        <div class="upload-grid">
            <div class="upload-box" onclick="document.getElementById('glbInput').click()" id="glbBox">
                <div class="box-title">Android / Web Engine</div>
                <div class="box-sub" id="glbName">Click to browse (.glb)</div>
                <input type="file" id="glbInput" accept=".glb">
            </div>
            
            <div class="upload-box" onclick="document.getElementById('usdzInput').click()" id="usdzBox">
                <div class="box-title">iOS AR Engine</div>
                <div class="box-sub" id="usdzName">Click to browse (.usdz)</div>
                <input type="file" id="usdzInput" accept=".usdz">
            </div>
        </div>

        <button class="btn-spatial" id="renderBtn" disabled>Publish Manifest & Get Card</button>
        <div id="status">Awaiting engine configuration...</div>

        <div id="viewerContainer">
            <button class="btn-fullscreen" onclick="toggleFullscreen()">⛶</button>
            <model-viewer id="modelViewer" ar ar-modes="webxr scene-viewer quick-look" camera-controls touch-action="none" shadow-intensity="1">
            </model-viewer>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="ar-card-capture-area">
                <div class="card-header">
                    <div class="card-logo-box">🌀</div>
                    <div>
                        <div class="card-title-main">HOLOVIEW</div>
                        <div class="card-title-sub">Spatial Portal Passport</div>
                    </div>
                </div>
                <div class="card-preview-body">
                    <span>Asset Synchronized ✅</span>
                </div>
                <div class="card-footer">
                    <div class="card-meta">
                        <div class="card-meta-title">Spatial AR Asset</div>
                        <div class="card-meta-desc">Scan to view in your room</div>
                    </div>
                    <div id="qrcode"></div>
                </div>
            </div>
            <button class="btn-spatial" style="max-width: 350px; background: #18181b; color: #fff; border: 1px solid #27272a;" onclick="closeModal()">Dismiss Passport</button>
        </div>
    </div>

    <script>
        const glbInput = document.getElementById('glbInput');
        const usdzInput = document.getElementById('usdzInput');
        const renderBtn = document.getElementById('renderBtn');
        const viewerContainer = document.getElementById('viewerContainer');
        const modelViewer = document.getElementById('modelViewer');
        const statusText = document.getElementById('status');

        // Otomatis Render Preview saat File GLB di-upload
        glbInput.addEventListener('change', (e) => {
            if(e.target.files[0]) {
                const file = e.target.files[0];
                document.getElementById('glbName').innerText = file.name;
                document.getElementById('glbBox').classList.add('has-file');
                
                // Load langsung ke model viewer
                const url = URL.createObjectURL(file);
                modelViewer.src = url;
                
                // Tampilkan Container 3D
                viewerContainer.style.display = 'block';
                
                // Aktifkan tombol publish
                renderBtn.removeAttribute('disabled');
                statusText.innerText = "Local Engine Configured. Ready to Publish!";
                statusText.style.color = "#3b82f6";
            }
        });

        usdzInput.addEventListener('change', (e) => {
            if(e.target.files[0]) {
                const file = e.target.files[0];
                document.getElementById('usdzName').innerText = file.name;
                document.getElementById('usdzBox').classList.add('has-file');
                
                const usdzUrl = URL.createObjectURL(file);
                modelViewer.setAttribute('ios-src', usdzUrl);
            }
        });

        // Trigger Tombol Publish untuk memunculkan Card & QR Code
        renderBtn.addEventListener('click', () => {
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = ""; // Reset QR Code lama

            // Menggunakan manifest link tiruan atau url object sementara yang valid
            const dummyShareUrl = window.location.href; 

            // Konfigurasi QR Code yang tidak padat agar sangat mudah discan
            new QRCode(qrContainer, {
                text: dummyShareUrl,
                width: 58,
                height: 58,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.L // Level L = Kotak modul renggang/tidak padat
            });

            document.getElementById('modalOverlay').classList.add('active');
        });

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                viewerContainer.requestFullscreen().catch(err => {
                    console.log(`Error: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }
    </script>
</body>
</html>
