<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Spatial AR Portal</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-pure-black: #000000;
            --card-dark: #0a0a0c;
            --border-glow: #1e1e24;
            --accent-spatial: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.25);
            --text-main: #f4f4f5;
            --text-muted: #71717a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-pure-black);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent-glow) 0%, rgba(0,0,0,0) 70%);
            top: 15%;
            left: 20%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border-glow);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            z-index: 1;
            position: relative;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .upload-box {
            border: 1px dashed #27272a;
            padding: 24px 16px;
            border-radius: 14px;
            cursor: pointer;
            background: #050507;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }

        .upload-box:hover {
            border-color: var(--accent-spatial);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .upload-box.has-file {
            border-style: solid;
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.03);
        }

        .upload-box input { display: none; }
        .box-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .box-sub { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .btn-spatial {
            background: var(--text-main);
            color: var(--bg-pure-black);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-spatial:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.1);
        }

        .btn-spatial:disabled {
            background: #18181b;
            color: #52525b;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #status { font-size: 13px; margin-top: 14px; font-weight: 500; text-align: center; }

        #timerBadge {
            display: none;
            margin: 16px auto 0 auto;
            background: rgba(239, 68, 110, 0.1);
            color: #f43f5e;
            border: 1px solid rgba(239, 68, 110, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            width: fit-content;
        }

        #viewerContainer {
            width: 100%;
            height: 400px;
            background: #000000;
            border-radius: 16px;
            margin-top: 24px;
            display: none;
            position: relative;
            border: 1px solid #141416;
            overflow: hidden;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #000000;
            --poster-color: transparent;
        }

        .fullscreen-toggle {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            letter-spacing: 0.5px;
        }

        #viewerContainer:fullscreen { border-radius: 0; width: 100vw; height: 100vh; margin-top: 0; }
        #viewerContainer:fullscreen .fullscreen-toggle { bottom: 24px; left: 24px; }

        /* POPUP MODAL & AR CARD DESIGN */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* The Card UI Wrapper styled based on the reference design */
        .ar-card-capture-area {
            width: 360px;
            height: 520px;
            background: #09090b;
            border-radius: 24px;
            padding: 24px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 2px solid #1e1e24;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.15);
            overflow: hidden;
        }

        /* Neon gradient border simulation */
        .ar-card-capture-area::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 24px;
            padding: 2px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6, #000, #3b82f6);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .card-logo-box {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            border: 1px solid #27272a;
            background: #141416;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card-title-main {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 1px;
            color: #ffffff;
        }

        .card-title-sub {
            font-size: 10px;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-preview-body {
            flex-grow: 1;
            margin: 16px 0;
            background: radial-gradient(circle, rgba(30,30,36,0.6) 0%, rgba(0,0,0,0) 80%);
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .card-preview-body img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-top: 1px solid #18181b;
            padding-top: 16px;
        }

        .card-meta-info {
            background: #020205;
            border: 1px solid #141416;
            padding: 12px;
            border-radius: 14px;
            min-width: 160px;
        }

        .meta-row {
            font-size: 11px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        .meta-row:last-child { margin-bottom: 0; }
        .meta-label { color: #52525b; text-transform: uppercase; font-weight: 600; }
        .meta-value { color: #f4f4f5; font-weight: 700; max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;}

        .card-qr-container {
            width: 95px;
            height: 95px;
            background: #ffffff;
            padding: 6px;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .card-qr-container div {
            width: 100%;
            height: 100%;
        }

        .action-buttons-wrapper {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .btn-modal {
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            flex: 1;
            text-align: center;
        }

        .btn-modal-save { background: #ffffff; color: #000000; }
        .btn-modal-close { background: #18181b; color: #a1a1aa; border: 1px solid #27272a; }
    </style>
</head>
<body>

    <div class="container">
        <h1>3D Spatial AR Portal</h1>
        <p class="subtitle">Instant local preview active. Assets hosted on cloud expire at midnight.</p>

        <div class="upload-grid">
            <div id="boxGlb" class="upload-box" onclick="document.getElementById('inputGlb').click()">
                <div class="box-title">Android / Web Engine</div>
                <div id="lblGlb" class="box-sub">Choose .glb file (Required)</div>
                <input type="file" id="inputGlb" accept=".glb">
            </div>

            <div id="boxUsdz" class="upload-box" onclick="document.getElementById('inputUsdz').click()">
                <div class="box-title">iOS AR Engine</div>
                <div id="lblUsdz" class="box-sub">Choose .usdz file (Optional)</div>
                <input type="file" id="inputUsdz" accept=".usdz">
            </div>
        </div>

        <button id="uploadBtn" class="btn-spatial" disabled>Publish & Get Share Card</button>
        <p id="status"></p>

        <div id="timerBadge">Expires In: <span id="countdown">--:--:--</span></div>

        <div id="viewerContainer">
            <button class="fullscreen-toggle" onclick="toggleViewFullscreen()">
                View in Holo
            </button>
        </div>
    </div>

    <div id="shareModal" class="modal-overlay">
        <div class="modal-content">
            <div id="arCard" class="ar-card-capture-area">
                <div class="card-header">
                    <div class="card-logo-box">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                    </div>
                    <div>
                        <div class="card-title-main">CREARTOR</div>
                        <div class="card-title-sub">WebAR Viewer Portal</div>
                    </div>
                </div>

                <div class="card-preview-body">
                    <img id="cardSnapshot" src="" alt="3D Model Preview">
                </div>

                <div class="card-footer">
                    <div class="card-meta-info">
                        <div class="meta-row"><span class="meta-label">Model</span><span id="metaName" class="meta-value">Unknown</span></div>
                        <div class="meta-row"><span class="meta-label">Size</span><span id="metaSize" class="meta-value">0.0 MB</span></div>
                    </div>
                    <div class="card-qr-container">
                        <div id="qrcode"></div>
                    </div>
                </div>
            </div>

            <div class="action-buttons-wrapper">
                <button class="btn-modal btn-modal-close" onclick="closeModal()">Close</button>
                <button class="btn-modal btn-modal-save" onclick="saveCardToPhotos()">Save to Photos</button>
            </div>
        </div>
    </div>

    <script>
        const inputGlb = document.getElementById('inputGlb');
        const inputUsdz = document.getElementById('inputUsdz');
        const boxGlb = document.getElementById('boxGlb');
        const boxUsdz = document.getElementById('boxUsdz');
        const lblGlb = document.getElementById('lblGlb');
        const lblUsdz = document.getElementById('lblUsdz');
        const uploadBtn = document.getElementById('uploadBtn');
        const status = document.getElementById('status');
        const timerBadge = document.getElementById('timerBadge');
        const countdown = document.getElementById('countdown');
        const viewerContainer = document.getElementById('viewerContainer');
        
        const shareModal = document.getElementById('shareModal');
        const cardSnapshot = document.getElementById('cardSnapshot');
        const metaName = document.getElementById('metaName');
        const metaSize = document.getElementById('metaSize');
        const qrcodeContainer = document.getElementById('qrcode');

        const MAX_SIZE = 10 * 1024 * 1024; // 10MB limit
        let localGlbUrl = "";
        let localUsdzUrl = "";
        let timerInterval = null;
        let qrCodeInstance = null;

        // INLINE LOCAL PREVIEW (GLB)
        inputGlb.addEventListener('change', () => {
            if (inputGlb.files[0]?.size > MAX_SIZE) { alert("GLB file size exceeds 10MB limit!"); inputGlb.value=""; return; }
            if (inputGlb.files[0]) {
                boxGlb.classList.add('has-file');
                lblGlb.innerText = inputGlb.files[0].name;
                
                if (localGlbUrl) URL.revokeObjectURL(localGlbUrl);
                localGlbUrl = URL.createObjectURL(inputGlb.files[0]);
                
                initEngineViewer(localGlbUrl, localUsdzUrl);
                status.innerHTML = "<span style='color:#3b82f6;'>Local Preview Active. Ready to view in Holo!</span>";
            }
            checkInputs();
        });

        // INLINE LOCAL PREVIEW (USDZ)
        inputUsdz.addEventListener('change', () => {
            if (inputUsdz.files[0]?.size > MAX_SIZE) { alert("USDZ file size exceeds 10MB limit!"); inputUsdz.value=""; return; }
            if (inputUsdz.files[0]) {
                boxUsdz.classList.add('has-file');
                lblUsdz.innerText = inputUsdz.files[0].name;

                if (localUsdzUrl) URL.revokeObjectURL(localUsdzUrl);
                localUsdzUrl = URL.createObjectURL(inputUsdz.files[0]);

                if (localGlbUrl) {
                    initEngineViewer(localGlbUrl, localUsdzUrl);
                }
            }
            checkInputs();
        });

        function checkInputs() {
            uploadBtn.disabled = !inputGlb.files[0];
        }

        window.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const modelParam = params.get('glb');
            const iosParam = params.get('usdz');
            if (modelParam) {
                initEngineViewer(modelParam, iosParam);
                startDestructionTimer();
            }
        });

        // CLOUD STORAGE UPLOAD INTERACTION
        uploadBtn.addEventListener('click', async () => {
            uploadBtn.disabled = true;
            status.innerHTML = "Pushing Spatial Manifest onto Vercel Architecture...";

            try {
                const resGlb = await fetch(`/api/upload?filename=${encodeURIComponent(inputGlb.files[0].name)}`, {
                    method: 'POST', body: inputGlb.files[0]
                });
                if (!resGlb.ok) throw new Error("GLB synchronization pipeline failure.");
                const dataGlb = await resGlb.json();

                let cloudUsdzUrl = "";
                if (inputUsdz.files[0]) {
                    status.innerHTML = "Synchronizing ecosystem pipeline with iOS Engine...";
                    const resUsdz = await fetch(`/api/upload?filename=${encodeURIComponent(inputUsdz.files[0].name)}`, {
                        method: 'POST', body: inputUsdz.files[0]
                    });
                    if (!resUsdz.ok) throw new Error("USDZ asset allocation refused by server.");
                    const dataUsdz = await resUsdz.json();
                    cloudUsdzUrl = dataUsdz.url;
                }

                status.innerHTML = "<span style='color:#10b981;'>Published successfully! Active until midnight.</span>";
                
                let shareLink = `${window.location.origin}${window.location.pathname}?glb=${encodeURIComponent(dataGlb.url)}`;
                if(cloudUsdzUrl) shareLink += `&usdz=${encodeURIComponent(cloudUsdzUrl)}`;

                // Clear temporary memory allocations
                if (localGlbUrl) { URL.revokeObjectURL(localGlbUrl); localGlbUrl = ""; }
                if (localUsdzUrl) { URL.revokeObjectURL(localUsdzUrl); localUsdzUrl = ""; }

                initEngineViewer(dataGlb.url, cloudUsdzUrl);
                startDestructionTimer();
                
                // Construct and display the pop-up share card interface
                triggerShareCard(shareLink, inputGlb.files[0].name, inputGlb.files[0].size);

            } catch (err) {
                status.innerHTML = `<span style='color:#ef4444;'>Cloud pipeline exception: ${err.message}</span>`;
                uploadBtn.disabled = false;
            }
        });

        function initEngineViewer(glbUrl, usdzUrl) {
            viewerContainer.style.display = 'block';
            
            const oldViewer = viewerContainer.querySelector('model-viewer');
            if (oldViewer) oldViewer.remove();

            const viewer = document.createElement('model-viewer');
            viewer.setAttribute('src', glbUrl);
            viewer.setAttribute('ar', '');
            viewer.setAttribute('ar-modes', 'webxr scene-viewer quick-look');
            viewer.setAttribute('camera-controls', '');
            viewer.setAttribute('auto-rotate', '');
            viewer.setAttribute('shadow-intensity', '1');
            viewer.setAttribute('crossorigin', 'anonymous');

            viewer.addEventListener('load', () => {
                setTimeout(() => {
                    const anims = viewer.availableAnimations;
                    if (anims && anims.length > 0) {
                        viewer.setAttribute('animation-name', anims[0]);
                        viewer.play();
                    }
                }, 100);
            });

            if (usdzUrl && usdzUrl !== "null" && usdzUrl !== "") {
                viewer.setAttribute('ios-src', usdzUrl);
            }

            viewerContainer.prepend(viewer);
        }

        // SHARE CARD COMPONENT GENERATOR
        function triggerShareCard(url, filename, sizeInBytes) {
            // Update textual card parameters
            const displaySize = (sizeInBytes / (1024 * 1024)).toFixed(1) + " MB";
            const displayName = filename.replace(/\.[^/.]+$/, ""); // Strip file extension
            
            metaName.innerText = displayName;
            metaSize.innerText = displaySize;

            // Generate clean vector QR Code inside card bounds
            qrcodeContainer.innerHTML = "";
            qrCodeInstance = new QRCode(qrcodeContainer, {
                text: url,
                width: 85,
                height: 85,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            // Extract high-res static frame matrix from structural <model-viewer> engine
            const viewer = viewerContainer.querySelector('model-viewer');
            if(viewer) {
                // Microtask delay ensuring active buffer translation maps cleanly to base64 uri data
                setTimeout(() => {
                    const dataUrl = viewer.toDataURL("image/png");
                    cardSnapshot.src = dataUrl;
                    shareModal.classList.add('active');
                }, 300);
            } else {
                shareModal.classList.add('active');
            }
        }

        function closeModal() {
            shareModal.classList.remove('active');
            uploadBtn.disabled = false;
        }

        // SAVE TO PHOTOS COMPONENT ENGINE via html2canvas
        function saveCardToPhotos() {
            const cardElement = document.getElementById('arCard');
            status.innerHTML = "Generating premium print layout container...";
            
            html2canvas(cardElement, {
                useCORS: true,
                allowTaint: true,
                backgroundColor: "#000000",
                scale: 2 // High definition matrix scaler rendering
            }).then(canvas => {
                const image = canvas.toDataURL("image/png");
                const link = document.createElement('a');
                link.download = `${metaName.innerText || 'AR'}_Share_Card.png`;
                link.href = image;
                link.click();
                status.innerHTML = "<span style='color:#10b981;'>Card successfully saved to downloads folder!</span>";
            }).catch(err => {
                alert("Vector mapping serialization failed: " + err.message);
            });
        }

        function startDestructionTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerBadge.style.display = 'block';
            
            const updateCountdown = () => {
                const now = new Date();
                const tomorrow = new Date();
                tomorrow.setHours(24, 0, 0, 0);
                const diff = tomorrow - now;
                
                if (diff <= 0) {
                    countdown.innerText = "00:00:00";
                    clearInterval(timerInterval);
                    location.reload();
                    return;
                }
                
                const hours = String(Math.floor((diff / (1000 * 60 * 60)) % 24)).padStart(2, '0');
                const minutes = String(Math.floor((diff / (1000 * 60)) % 60)).padStart(2, '0');
                const seconds = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');

                countdown.innerText = `${hours}:${minutes}:${seconds}`;
            };

            updateCountdown();
            timerInterval = setInterval(updateCountdown, 1000);
        }

        function toggleViewFullscreen() {
            if (!document.fullscreenElement) {
                viewerContainer.requestFullscreen().catch(err => {
                    alert(`Holo Engine failed to scale viewport: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }
    </script>
</body>
</html>
