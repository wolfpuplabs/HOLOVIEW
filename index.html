<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Spatial AR Portal</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        :root {
            --bg-pure-black: #000000;
            --card-dark: #0a0a0c;
            --border-glow: #1e1e24;
            --accent-spatial: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.25);
            --text-main: #f4f4f5;
            --text-muted: #71717a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-pure-black);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* Spatial Fog Vibe Background Effect */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent-glow) 0%, rgba(0,0,0,0) 70%);
            top: 15%;
            left: 20%;
            z-index: 0;
            pointer-events: none;
        }
        body::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, rgba(0,0,0,0) 70%);
            bottom: 10%;
            right: 15%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: rgba(10, 10, 12, 0.8);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border-glow);
            box-shadow: 0 20px 40px rgba(0,0,0,0.7);
            z-index: 1;
            position: relative;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 24px;
        }

        /* Dual Grid Upload Box */
        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .upload-box {
            border: 1px dashed #27272a;
            padding: 24px 16px;
            border-radius: 14px;
            cursor: pointer;
            background: #050507;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }

        .upload-box:hover {
            border-color: var(--accent-spatial);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .upload-box.has-file {
            border-style: solid;
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.03);
        }

        .upload-box input { display: none; }
        .box-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .box-sub { font-size: 11px; color: var(--text-muted); }

        .btn-spatial {
            background: var(--text-main);
            color: var(--bg-pure-black);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-spatial:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.1);
        }

        .btn-spatial:disabled {
            background: #18181b;
            color: #52525b;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #status { font-size: 13px; margin-top: 14px; font-weight: 500; }

        /* Share Link Component */
        #shareSection { margin-top: 24px; display: none; }
        .share-wrapper {
            background: #09090b;
            border: 1px solid #18181b;
            padding: 10px 14px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 6px;
        }
        .share-text { font-size: 13px; color: var(--accent-spatial); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 85%; }
        .btn-copy { background: #18181b; color: white; border: 1px solid #27272a; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }

        /* Timer Badge */
        #timerBadge {
            display: none;
            margin: 16px auto 0 auto;
            background: rgba(239, 68, 110, 0.1);
            color: #f43f5e;
            border: 1px solid rgba(239, 68, 110, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            width: fit-content;
        }

        /* Pure Black Spatial Fullscreen Viewer Container */
        #viewerContainer {
            width: 100%;
            height: 400px;
            background: #000000;
            border-radius: 16px;
            margin-top: 24px;
            display: none;
            position: relative;
            border: 1px solid #141416;
            overflow: hidden;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #000000;
            --poster-color: transparent;
        }

        /* Fullscreen Native Trigger Control */
        .fullscreen-toggle {
            position: absolute;
            bottom: 16px;
            left: 16px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Ketika container masuk mode fullscreen API native */
        #viewerContainer:fullscreen { border-radius: 0; width: 100vw; height: 100vh; margin-top: 0; }
        #viewerContainer:fullscreen .fullscreen-toggle { bottom: 24px; left: 24px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>3D Spatial AR Portal</h1>
        <p class="subtitle">Dual Engine Uploader (Maks 10MB/file). File hancur otomatis malam ini.</p>

        <div class="upload-grid">
            <div id="boxGlb" class="upload-box" onclick="document.getElementById('inputGlb').click()">
                <div class="box-title">🤖 Android / Web Engine</div>
                <div id="lblGlb" class="box-sub">Pilih file .glb (Wajib)</div>
                <input type="file" id="inputGlb" accept=".glb">
            </div>

                <div class="box-title">🍏 iOS AR Engine</div>
                <div id="lblUsdz" class="box-sub">Pilih file .usdz (Opsional)</div>
                <input type="file" id="inputUsdz" accept=".us
