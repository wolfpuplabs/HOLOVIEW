<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOLOVIEW // Spatial AR Portal</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --bg-pure-black: #050507;
            --card-dark: #0b0b0f;
            --border-glow: #1f1f2e;
            --accent-spatial: #3b82f6;
            --accent-glow: rgba(59, 130, 246, 0.2);
            --text-main: #f4f4f5;
            --text-muted: #71717a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-pure-black);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 650px;
            background: rgba(11, 11, 15, 0.85);
            backdrop-filter: blur(20px);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border-glow);
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            z-index: 1;
            position: relative;
            margin-top: 40px;
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            background: linear-gradient(to right, #ffffff, #a1a1aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 13px;
            margin-bottom: 24px;
        }

        .upload-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .upload-box {
            border: 1px dashed #27272a;
            padding: 24px 16px;
            border-radius: 14px;
            cursor: pointer;
            background: #09090b;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-align: center;
        }

        .upload-box:hover {
            border-color: var(--accent-spatial);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .upload-box.has-file {
            border-style: solid;
            border-color: #10b981;
            background: rgba(16, 185, 129, 0.03);
        }

        .upload-box input { display: none; }
        .box-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; }
        .box-sub { font-size: 11px; color: var(--text-muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .btn-spatial {
            background: var(--text-main);
            color: var(--bg-pure-black);
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-spatial:hover {
            transform: translateY(-1px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.15);
        }

        .btn-spatial:disabled {
            background: #18181b;
            color: #52525b;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #status { font-size: 13px; margin-top: 14px; font-weight: 500; text-align: center; }

        #timerBadge {
            display: none;
            margin: 16px auto 0 auto;
            background: rgba(239, 68, 110, 0.1);
            color: #f43f5e;
            border: 1px solid rgba(239, 68, 110, 0.2);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            width: fit-content;
        }

        /* Pure Black Viewer Container dengan efek Spatial Radial Glow */
        #viewerContainer {
            width: 100%;
            height: 400px;
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.12) 0%, rgba(139, 92, 246, 0.04) 40%, #000000 80%);
            border-radius: 16px;
            margin-top: 24px;
            display: none;
            position: relative;
            border: 1px solid #18181b;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0, 0, 0, 0.9);
        }

        /* Diubah ke transparent agar background gradient di container terlihat menembus */
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: transparent;
        }

        .ar-fullscreen-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Supaya klik tidak terhalang ke model-viewer */
            z-index: 10;
        }

        /* Fullscreen Button Styles */
        .btn-fullscreen {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(11, 11, 15, 0.85);
            border: 1px solid var(--border-glow);
            color: #ffffff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: all 0.2s ease;
            pointer-events: auto; /* Mengembalikan interaksi klik khusus tombol */
            z-index: 12;
        }

        .btn-fullscreen:hover {
            background: #ffffff;
            color: #000000;
            transform: scale(1.05);
        }

        /* Native Fullscreen API overrides */
        #viewerContainer:fullscreen {
            width: 100vw !important;
            height: 100vh !important;
            max-width: 100vw !important;
            border-radius: 0 !important;
            border: none !important;
            margin: 0 !important;
            background: #000000 !important; /* Full black saat fullscreen penuh */
        }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .ar-card-capture-area {
            width: 360px;
            height: 540px;
            background: #0b0b11;
            border-radius: 20px;
            padding: 24px;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            border: 2px solid #2a2a3a;
            box-shadow: 0 0 35px rgba(59, 130, 246, 0.15);
            overflow: hidden;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #1a1a26;
            padding-bottom: 14px;
        }

        .card-logo-box {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }

        .card-title-main {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 1.5px;
            color: #ffffff;
            background: linear-gradient(to right, #ffffff, #a5b4fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card-title-sub {
            font-size: 10px;
            color: #6366f1;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
            margin-top: 1px;
        }

        .card-preview-body {
            flex-grow: 1;
            margin: 20px 0;
            background: #06060a;
            border: 1px solid #151522;
            border-radius: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        .card-preview-body img {
            max-width: 95%;
            max-height: 95%;
            object-fit: contain;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.5));
            z-index: 2;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center
