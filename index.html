<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D AR Library & Gallery</title>
  
  <!-- Import library model-viewer untuk render 3D dan AR -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

  <style>
    :root {
      --primary-color: #4f46e5;
      --primary-hover: #4338ca;
      --success-color: #10b981;
      --background: #f8fafc;
      --card-bg: #ffffff;
      --text-main: #1e293b;
      --text-muted: #64748b;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--background);
      color: var(--text-main);
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      text-align: center;
      margin-bottom: 30px;
    }

    h1 {
      margin: 0 0 10px 0;
      color: var(--primary-color);
    }

    .main-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 25px;
    }

    @media (min-width: 768px) {
      .main-layout {
        grid-template-columns: 3fr 2fr;
      }
    }

    /* Viewer Section */
    .viewer-section {
      background: var(--card-bg);
      padding: 15px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
    }

    model-viewer {
      width: 100%;
      height: 400px;
      background-color: #f1f5f9;
      border-radius: 8px;
      --ar-button-display: none; /* Kita bikin tombol AR custom */
    }

    .ar-custom-btn {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      width: 100%;
    }

    /* Upload Section */
    .upload-section {
      background: var(--card-bg);
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-weight: 600;
      font-size: 14px;
    }

    input[type="text"], input[type="file"] {
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
    }

    button.btn-upload {
      background-color: var(--success-color);
      color: white;
      border: none;
      padding: 12px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    button.btn-upload:hover {
      opacity: 0.9;
    }

    .status-text {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }

    /* Library / Gallery Section */
    .library-section {
      margin-top: 40px;
    }

    .grid-library {
      display: grid;
      grid-template-columns: repeat(auto-fill, min-max(200px, 1fr));
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 15px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 10px;
      padding: 15px;
      box-shadow: 0 2px 4px rgb(0 0 0 / 0.05);
      border: 1px solid #e2e8f0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
    }

    .card-title {
      font-weight: bold;
      margin: 0;
      font-size: 16px;
    }

    .card-actions {
      display: flex;
      gap: 10px;
    }

    .btn-card {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
    }

    .btn-view { background-color: #e2e8f0; color: var(--text-main); }
    .btn-share { background-color: var(--primary-color); color: white; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h1>3D Model Library & AR Share</h1>
      <p style="color: var(--text-muted); margin: 0;">Upload model .glb kamu, simpan ke pustaka, dan bagikan ke teman!</p>
    </header>

    <div class="main-layout">
      <!-- Sisi Kiri: Viewer -->
      <div class="viewer-section">
        <model-viewer 
          id="main-viewer" 
          camera-controls 
          auto-rotate 
          ar 
          ar-modes="webxr scene-viewer quick-look" 
          shadow-intensity="1"
          alt="Main 3D Viewer">
        </model-viewer>
        <button id="ar-trigger" class="ar-custom-btn">Lihat di Lingkungan Nyata (AR)</button>
      </div>

      <!-- Sisi Kanan: Form Upload -->
      <div class="upload-section">
        <h3 style="margin: 0 0 10px 0;">Tambah Koleksi Baru</h3>
        
        <div class="form-group">
          <label for="model-name">Nama Model 3D</label>
          <input type="text" id="model-name" placeholder="Contoh: Kursi Kayu Estetik">
        </div>

        <div class="form-group">
          <label for="file-upload">File Model (.glb)</label>
          <input type="file" id="file-upload" accept=".glb">
        </div>

        <button id="upload-btn" class="btn-upload">Upload & Simpan</button>
        <div id="upload-status" class="status-text">Siap mengupload.</div>
      </div>
    </div>

    <!-- Bagian Pustaka / Library -->
    <div class="library-section">
      <h2>Pustaka Model 3D</h2>
      <div id="library-grid" class="grid-library">
        <!-- Data dari Firebase Firestore akan muncul di sini secara dinamis -->
        <p id="loading-text" style="color: var(--text-muted);">Memuat pustaka model...</p>
      </div>
    </div>
  </div>

  <!-- Firebase SDK v10 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getStorage, ref, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";
    import { getFirestore, collection, addDoc, getDocs, getDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // ⚠️ GANTI DENGAN KONFIGURASI FIREBASE KAMU
    const firebaseConfig = {
      apiKey: "API_KEY_KAMU",
      authDomain: "PROJECT_ID.firebaseapp.com",
      projectId: "PROJECT_ID",
      storageBucket: "PROJECT_ID.appspot.com",
      messagingSenderId: "SENDER_ID",
      appId: "APP_ID"
    };

    // Inisialisasi Firebase
    const app = initializeApp(firebaseConfig);
    const storage = getStorage(app);
    const db = getFirestore(app);

    // DOM Elements
    const mainViewer = document.getElementById('main-viewer');
    const arTrigger = document.getElementById('ar-trigger');
    const modelNameInput = document.getElementById('model-name');
    const fileUploadInput = document.getElementById('file-upload');
    const uploadBtn = document.getElementById('upload-btn');
    const uploadStatus = document.getElementById('upload-status');
    const libraryGrid = document.getElementById('library-grid');

    // Load Pustaka & Cek Parameter URL saat pertama kali dibuka
    window.addEventListener('DOMContentLoaded', async () => {
      await loadLibrary();
      
      // Cek apakah ada parameter "?id=ID_DOKUMEN" di URL untuk auto-load share link
      const urlParams = new URLSearchParams(window.location.search);
      const modelId = urlParams.get('id');
      if (modelId) {
        loadSharedModel(modelId);
      }
    });

    // Aktifkan AR lewat tombol custom
    arTrigger.addEventListener('click', () => {
      if (mainViewer.canActivateAR) {
        mainViewer.activateAR();
      } else {
        alert("Perangkat atau browser Anda tidak mendukung mode AR.");
      }
    });

    // Fungsi Mengambil Data dari Firestore & Menampilkan ke Pustaka
    async function loadLibrary() {
      try {
        const q = query(collection(db, "models"), orderBy("createdAt", "desc"));
        const querySnapshot = await getDocs(q);
        
        // Hapus teks loading
        libraryGrid.innerHTML = '';

        if (querySnapshot.empty) {
          libraryGrid.innerHTML = '<p style="color: var(--text-muted);">Belum ada model di pustaka. Yuk upload!</p>';
          return;
        }

        // Set model pertama sebagai default di viewer utama jika viewer masih kosong
        let isFirst = true;

        querySnapshot.forEach((docSnap) => {
          const data = docSnap.data();
          const id = docSnap.id;

          if (isFirst && !mainViewer.src) {
            mainViewer.src = data.url;
            isFirst = false;
          }

          // Bikin komponen Card HTML
          const card = document.createElement('div');
          card.className = 'card';
          card.innerHTML = `
            <p class="card-title">${data.name}</p>
            <div class="card-actions">
              <button class="btn-card btn-view" data-url="${data.url}">Lihat</button>
              <button class="btn-card btn-share" data-id="${id}">Bagikan</button>
            </div>
          `;

          // Event Listener Tombol "Lihat" di Card
          card.querySelector('.btn-view').addEventListener('click', (e) => {
            mainViewer.src = e.target.getAttribute('data-url');
            window.scrollTo({ top: 0, behavior: 'smooth' });
          });

          // Event Listener Tombol "Bagikan" di Card
          card.querySelector('.btn-share').addEventListener('click', (e) => {
            const docId = e.target.getAttribute('data-id');
            shareModelLink(docId);
          });

          libraryGrid.appendChild(card);
        });
      } catch (error) {
        console.error("Gagal memuat pustaka:", error);
        libraryGrid.innerHTML = '<p style="color: red;">Gagal memuat pustaka model.</p>';
      }
    }

    // Fungsi untuk Load Model Spesifik dari Link Share
    async function loadSharedModel(id) {
      try {
        uploadStatus.innerText = "Memuat model dari link yang dibagikan...";
        const docRef = doc(db, "models", id);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
          const data = docSnap.data();
          mainViewer.src = data.url;
          uploadStatus.innerText = `Menampilkan model share: ${data.name}`;
        } else {
          alert("Model yang dibagikan tidak ditemukan atau sudah dihapus.");
        }
      } catch (error) {
        console.error(error);
      }
    }

    // Proses Simpan & Upload
    uploadBtn.addEventListener('click', async () => {
      const name = modelNameInput.value.trim();
      const file = fileUploadInput.files[0];

      if (!name) {
        alert("Harap masukkan nama model terlebih dahulu!");
        return;
      }
      if (!file) {
        alert("Harap pilih file .glb terlebih dahulu!");
        return;
      }

      // Mulai upload ke Storage
      uploadBtn.disabled = true;
      const fileRef = ref(storage, `models/${Date.now()}_${file.name}`);
      const uploadTask = uploadBytesResumable(fileRef, file);

      uploadTask.on('state_changed', 
        (snapshot) => {
          const progress = (snapshot.bytesTransferred / snapshot.totalBytes) * 100;
          uploadStatus.innerText = `Mengunggah file ke Storage: ${Math.round(progress)}%`;
        }, 
        (error) => {
          console.error(error);
          uploadStatus.innerText = "Gagal mengunggah file.";
          uploadBtn.disabled = false;
        }, 
        async () => {
          // Jika sukses upload file, ambil URL publiknya
          const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
          
          uploadStatus.innerText = "Menyimpan info model ke Database (Firestore)...";

          // Simpan data text (Metadata) ke Cloud Firestore (Database)
          try {
            await addDoc(collection(db, "models"), {
              name: name,
              url: downloadURL,
              createdAt: new Date().toISOString()
            });

            uploadStatus.innerText = "Berhasil disimpan ke Pustaka!";
            modelNameInput.value = '';
            fileUploadInput.value = '';
            
            // Set viewer ke model baru
            mainViewer.src = downloadURL;

            // Refresh list pustaka agar model baru langsung muncul
            await loadLibrary();
          } catch (dbErr) {
            console.error(dbErr);
            uploadStatus.innerText = "File terupload, tapi gagal disimpan ke database.";
          } finally {
            uploadBtn.disabled = false;
          }
        }
      );
    });

    // Fungsi Share Link
    function shareModelLink(id) {
      const shareUrl = `${window.location.origin}${window.location.pathname}?id=${id}`;
      
      if (navigator.share) {
        navigator.share({
          title: 'Lihat Model 3D ini di AR!',
          text: 'Buka link ini untuk melihat objek 3D secara interaktif dan masuk ke mode AR.',
          url: shareUrl
        }).catch(console.error);
      } else {
        navigator.clipboard.writeText(shareUrl);
        alert("Link unik model telah disalin ke clipboard! Bagikan ke temanmu.");
      }
    }
  </script>
</body>
</html>
