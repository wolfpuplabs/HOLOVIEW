<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D AR Asset Library & Temporary Share</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --accent-color: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
            --error-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            text-align: center;
            margin-top: 40px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .upload-area {
            border: 2px dashed #3f3f46;
            padding: 40px 20px;
            border-radius: 12px;
            cursor: pointer;
            transition: border-color 0.2s;
            background: #1f1f23;
        }

        .upload-area:hover {
            border-color: var(--accent-color);
        }

        #fileInput {
            display: none;
        }

        .upload-icon {
            font-size: 40px;
            margin-bottom: 12px;
            display: inline-block;
        }

        .btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
            transition: background 0.2s;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn:disabled {
            background: #3f3f46;
            color: var(--text-muted);
            cursor: not-allowed;
        }

        #statusMessage {
            margin-top: 16px;
            font-size: 14px;
            font-weight: 500;
        }

        .error { color: var(--error-color); }
        .success { color: #10b981; }

        #shareContainer {
            margin-top: 24px;
            display: none;
            text-align: left;
        }

        .share-box {
            background: #27272a;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 8px;
        }

        .share-url {
            font-size: 13px;
            color: #3b82f6;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            width: 80%;
        }

        .copy-btn {
            background: #3f3f46;
            border: none;
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        /* 3D View Styling */
        #viewerContainer {
            width: 100%;
            height: 400px;
            background: #000;
            border-radius: 12px;
            margin-top: 24px;
            display: none;
            position: relative;
        }

        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #1f1f23;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>3D AR Portal</h1>
        <p class="subtitle">Upload file .glb atau .usdz (Maks 10MB). File otomatis terhapus dalam 24 jam.</p>

        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <span class="upload-icon">📦</span>
            <p id="uploadPrompt">Klik untuk memilih file 3D</p>
            <span style="font-size: 12px; color: var(--text-muted);">Format: .glb, .usdz</span>
            <input type="file" id="fileInput" accept=".glb,.usdz">
        </div>

        <button id="uploadBtn" class="btn" disabled>Upload & Generate Link</button>
        <p id="statusMessage"></p>

        <div id="shareContainer">
            <label style="font-size: 14px; color: var(--text-muted);">Link Share AR lu:</label>
            <div class="share-box">
                <span id="shareUrl" class="share-url"></span>
                <button class="copy-btn" onclick="copyLink()">Copy</button>
            </div>
        </div>

        <div id="viewerContainer">
            </div>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadPrompt = document.getElementById('uploadPrompt');
        const statusMessage = document.getElementById('statusMessage');
        const shareContainer = document.getElementById('shareContainer');
        const shareUrl = document.getElementById('shareUrl');
        const viewerContainer = document.getElementById('viewerContainer');

        const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10 Megabytes

        // Jalankan logic jika user membuka link share langsung via parameter URL (?model=...)
        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const modelUrl = urlParams.get('model');
            const filename = urlParams.get('file') || 'model.glb';
            if (modelUrl) {
                initModelViewer(modelUrl, filename);
            }
        });

        fileInput.addEventListener('change', () => {
            const file = fileInput.files[0];
            if (!file) return;

            // PROTEKSI MAKSIMAL 10MB
            if (file.size > MAX_FILE_SIZE) {
                statusMessage.className = 'error';
                statusMessage.innerText = 'Gagal: Ukuran file melebihi 10MB!';
                fileInput.value = '';
                uploadBtn.disabled = true;
                uploadPrompt.innerText = 'Klik untuk memilih file 3D';
                return;
            }

            uploadPrompt.innerText = `Terpilih: ${file.name} (${(file.size / (1024 * 1024)).toFixed(2)} MB)`;
            statusMessage.innerText = '';
            uploadBtn.disabled = false;
        });

        uploadBtn.addEventListener('click', async () => {
            const file = fileInput.files[0];
            if (!file) return;

            uploadBtn.disabled = true;
            statusMessage.className = '';
            statusMessage.innerText = 'Sedang mengupload file ke Cloud...';

            try {
                // Upload file mentah lewat API backend kita
                const response = await fetch(`/api/upload?filename=${encodeURIComponent(file.name)}`, {
                    method: 'POST',
                    body: file,
                    headers: {
                        'Content-Type': 'application/octet-stream'
                    }
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || 'Gagal upload file.');
                }

                const data = await response.json(); // Mengambil data blob.url
                
                statusMessage.className = 'success';
                statusMessage.innerText = 'Upload Berhasil!';

                // Bikin Link Kombinasi buat di-share
                const generatedLink = `${window.location.origin}${window.location.pathname}?model=${encodeURIComponent(data.url)}&file=${encodeURIComponent(file.name)}`;
                shareUrl.innerText = generatedLink;
                shareContainer.style.display = 'block';

                // Tampilkan preview 3D interaktif langsung di bawahnya
                initModelViewer(data.url, file.name);

            } catch (error) {
                statusMessage.className = 'error';
                statusMessage.innerText = `Error: ${error.message}`;
                uploadBtn.disabled = false;
            }
        });

        function initModelViewer(modelUrl, filename) {
            viewerContainer.innerHTML = '';
            viewerContainer.style.display = 'block';

            // Build Model Viewer Element secara dinamis
            const viewer = document.createElement('model-viewer');
            viewer.setAttribute('src', modelUrl);
            viewer.setAttribute('alt', 'Dynamic 3D AR Model');
            viewer.setAttribute('ar', '');
            viewer.setAttribute('ar-modes', 'webxr scene-viewer quick-look');
            viewer.setAttribute('camera-controls', '');
            viewer.setAttribute('auto-rotate', '');
            viewer.setAttribute('shadow-intensity', '1');
            
            // Atribut wajib autoplay
            viewer.setAttribute('autoplay', '');

            // JURUS ANTI-DIEM: Paksa ambil animasi bawaan pas modelnya kelar ke-load
            viewer.addEventListener('load', () => {
                const availableAnimations = viewer.availableAnimations;
                if (availableAnimations && availableAnimations.length > 0) {
                    // Tembak nama animasi pertama yang tersimpan di file .glb/.usdz
                    viewer.animationName = availableAnimations[0];
                    viewer.play();
                }
            });

            // Handler Khusus Ekstensi USDZ Apple Quick Look iOS
            if (filename.toLowerCase().endsWith('.usdz')) {
                viewer.setAttribute('ios-src', modelUrl);
            }

            viewerContainer.appendChild(viewer);
        }

        function copyLink() {
            navigator.clipboard.writeText(shareUrl.innerText);
            alert('Link berhasil disalin, bang!');
        }
    </script>
</body>
</html>
